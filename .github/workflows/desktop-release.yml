name: Desktop Release

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/desktop-release.yml'

permissions:
  contents: read

jobs:
  build_desktop:
    name: Build ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target_name: windows-msi
            dist_script: dist:win
            extension: msi
          - os: ubuntu-latest
            target_name: linux-deb
            dist_script: dist:linux
            extension: deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci
        working-directory: frontend

      - name: Download 7zip binary (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p node_modules/7zip-bin/linux/x64
          curl -fsSL "https://github.com/develar/7zip-bin/raw/master/linux/x64/7za" \
            -o node_modules/7zip-bin/linux/x64/7za
          chmod +x node_modules/7zip-bin/linux/x64/7za
        working-directory: frontend

      - name: Debug node_modules paths
        run: |
          echo "=== find 7zip-bin ==="
          find . -path "*/7zip-bin/linux" -not -path "*/node_modules/*/node_modules/*" 2>/dev/null || true
          echo "=== electron-builder resolves from ==="
          node -e "console.log(require.resolve('7zip-bin'))" || true
          echo "=== npm root ==="
          npm root
          npm root -g
        working-directory: frontend

      - name: Download 7zip binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "node_modules\7zip-bin\win\x64" | Out-Null
          Invoke-WebRequest `
            -Uri "https://github.com/develar/7zip-bin/raw/master/win/x64/7za.exe" `
            -OutFile "node_modules\7zip-bin\win\x64\7za.exe"
        working-directory: frontend

      - name: Prepare sidecar placeholder (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "frontend/apps/desktop/sidecars/win" | Out-Null
          if (-not (Test-Path "frontend/apps/desktop/sidecars/win/tool.exe")) {
            Set-Content -Path "frontend/apps/desktop/sidecars/win/tool.exe" -Value ""
          }

      - name: Prepare sidecar placeholder (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p frontend/apps/desktop/sidecars/linux
          if [ ! -f frontend/apps/desktop/sidecars/linux/tool ]; then
            printf '#!/usr/bin/env sh\nexit 0\n' > frontend/apps/desktop/sidecars/linux/tool
            chmod +x frontend/apps/desktop/sidecars/linux/tool
          fi

      - name: Build desktop
        run: npm run ${{ matrix.dist_script }} --workspace=@goportal/desktop
        working-directory: frontend

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target_name }}
          path: frontend/apps/desktop/release/**/*.${{ matrix.extension }}
          if-no-files-found: error

  release:
    name: Semantic release
    runs-on: ubuntu-latest
    needs: [build_desktop]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Windows MSI
        uses: actions/download-artifact@v4
        with:
          name: windows-msi
          path: release-assets/windows

      - name: Download Linux DEB
        uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: release-assets/linux

      - name: Install semantic-release
        run: |
          npm install --no-save \
            semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/github \
            conventional-changelog-conventionalcommits

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
